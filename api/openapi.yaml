openapi: "3.1.0"
info:
  title: OPS Public API
  version: "1.0.0"
  description: |
    Programmatic access to One Perfect Slice. Authenticate with a team-scoped
    API key (Bearer sk_...) obtained from OrgSettings.

servers:
  - url: /
    description: OPS server root (paths include the full /api/public/v1 prefix)

security:
  - bearerAuth: []

paths:
  /api/public/v1/slices:
    get:
      operationId: listSlices
      summary: List all slices available to the token's team
      tags: [Slices]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Slice list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [slices]
                    properties:
                      slices:
                        type: array
                        items:
                          $ref: "#/components/schemas/SliceSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/public/v1/slices/{key}:
    get:
      operationId: getSlice
      summary: Get full slice definition including outputSchema
      tags: [Slices]
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Unique slice key (e.g. "high_intent_deals")
      responses:
        "200":
          description: Slice detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/SliceDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Monthly usage limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: USAGE_LIMIT_EXCEEDED
                  message: Monthly usage limit for AI insights runs has been exceeded
        "404":
          description: Slice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: SLICE_NOT_FOUND
                  message: Slice not found

  /api/public/v1/slices/{key}/preview-count:
    post:
      operationId: previewCount
      summary: Return matched call count without triggering LLM analysis
      tags: [Slices]
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Unique slice key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SliceFilterRequest"
      responses:
        "200":
          description: Matched call count
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [matchedCallCount]
                    properties:
                      matchedCallCount:
                        type: integer
                        description: Number of calls matching the filters
                        example: 87
        "400":
          description: Invalid filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidFilters:
                  value:
                    error:
                      code: INVALID_FILTERS
                      message: Filter validation failed
                dateRangeTooWide:
                  value:
                    error:
                      code: DATE_RANGE_TOO_WIDE
                      message: Maximum lookback is 90 days from today.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Slice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: SLICE_NOT_FOUND
                  message: Slice not found
        "503":
          description: Preview count request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: PREVIEW_COUNT_TIMEOUT
                  message: Preview count request timed out

  /api/public/v1/slices/{key}/run:
    post:
      operationId: runSlice
      summary: Start async slice execution
      tags: [Slices]
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Unique slice key
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 255
          description: Client-provided idempotency key (Stripe convention). Same key + same args returns original runId. Same key + different args returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunSliceRequest"
      responses:
        "202":
          description: Run accepted (async execution started)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RunCreatedResponse"
        "400":
          description: Invalid filters or idempotency key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidFilters:
                  value:
                    error:
                      code: INVALID_FILTERS
                      message: Filter validation failed
                invalidIdempotencyKey:
                  value:
                    error:
                      code: INVALID_IDEMPOTENCY_KEY
                      message: Idempotency key must be between 1 and 255 characters
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Slice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: SLICE_NOT_FOUND
                  message: Slice not found
        "409":
          description: Idempotency key conflict (same key, different args)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: IDEMPOTENCY_KEY_CONFLICT
                  message: Idempotency key was already used with different arguments
        "429":
          description: Team already has the maximum number of active slice runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: CONCURRENT_RUN_LIMIT
                  message: Maximum of 5 concurrent slice runs per team. Wait for existing runs to complete.
        "503":
          description: Temporary unavailability during billing or idempotency admission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                billingUnavailable:
                  value:
                    error:
                      code: BILLING_UNAVAILABLE
                      message: Usage gating is temporarily unavailable
                idempotencyInProgress:
                  value:
                    error:
                      code: IDEMPOTENCY_KEY_IN_PROGRESS
                      message: A run for this Idempotency-Key is currently being created. Retry after a short delay.

  /api/public/v1/slice-runs:
    get:
      operationId: listSliceRuns
      summary: List paginated run history, filterable by sliceKey and status
      tags: [Slice Runs]
      security:
        - bearerAuth: []
      parameters:
        - name: sliceKey
          in: query
          required: false
          schema:
            type: string
          description: Filter by slice key
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, running, completed, failed]
          description: Filter by run status
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of results per page (max 100)
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Offset for pagination
      responses:
        "200":
          description: Paginated run list
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SliceRunListItem"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          description: Invalid filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: INVALID_FILTERS
                  message: "Invalid status filter. Valid values: pending, running, completed, failed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Run history request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: RUN_LIST_TIMEOUT
                  message: Run history request timed out

  /api/public/v1/slice-runs/{id}:
    get:
      operationId: getSliceRun
      summary: Get run status, progress, and result when completed
      tags: [Slice Runs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Run ID
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/SliceRunDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Run not found or belongs to different org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: RUN_NOT_FOUND
                  message: Run not found
        "503":
          description: Run lookup request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: RUN_LOOKUP_TIMEOUT
                  message: Run lookup request timed out

  /api/public/v1/slice-runs/{id}/evidence:
    get:
      operationId: getSliceRunEvidence
      summary: Get evidence items grouped by element, capped at 20 per element
      tags: [Slice Runs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Run ID
      responses:
        "200":
          description: Evidence grouped by element
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/EvidenceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Run not found or belongs to different org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: RUN_NOT_FOUND
                  message: Run not found
        "409":
          description: Run is not yet completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: RUN_NOT_COMPLETED
                  message: Evidence is only available for completed runs
        "503":
          description: Evidence request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: EVIDENCE_TIMEOUT
                  message: Evidence request timed out

  /api/public/v1/evidence/search:
    post:
      operationId: searchEvidence
      summary: Search normalized evidence across completed runs
      tags: [Slice Runs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicEvidenceSearchRequest"
      responses:
        "200":
          description: Matching evidence items
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    properties:
                      matches:
                        type: array
                        items:
                          type: object
        "400":
          description: Invalid request body or filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Evidence request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/public/v1/posts/search:
    post:
      operationId: searchPosts
      summary: Search posts for the token's team using structured filters
      description: CRM filter values are selected from org-scoped CRM reference data, but returned posts remain team-scoped.
      tags: [Posts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicPostSearchRequest"
      responses:
        "200":
          description: Paginated post search results
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: object
                    required: [posts]
                    properties:
                      posts:
                        type: array
                        items:
                          oneOf:
                            - $ref: "#/components/schemas/PublicPostSummaryResponse"
                            - $ref: "#/components/schemas/PublicPostResponse"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          description: Invalid request body or filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidRequest:
                  value:
                    error:
                      code: INVALID_REQUEST
                      message: Malformed JSON body
                invalidFilters:
                  value:
                    error:
                      code: INVALID_FILTERS
                      message: Limit must be between 1 and 100
                dateRangeTooWide:
                  value:
                    error:
                      code: DATE_RANGE_TOO_WIDE
                      message: Maximum lookback is 90 days from today.
                filterArrayTooLarge:
                  value:
                    error:
                      code: FILTER_ARRAY_TOO_LARGE
                      message: Filter array exceeds maximum size
                      details:
                        field: crmDealStages
                        maxAllowed: 100
                        validValuesEndpoint: /api/public/v1/filters/crm-deal-stages
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Post search request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: POST_SEARCH_TIMEOUT
                  message: Post search request timed out

  /api/public/v1/posts/{id}:
    get:
      operationId: getPost
      summary: Retrieve a single post by id
      tags: [Posts]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Full post detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/PublicPostResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/public/v1/posts/filters:
    get:
      operationId: listPostFilters
      summary: List available post filters for the token's team
      tags: [Posts]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Available post filters
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [filters]
                    properties:
                      filters:
                        type: array
                        items:
                          $ref: "#/components/schemas/PostFilter"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Filter discovery request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: FILTER_LOOKUP_TIMEOUT
                  message: Filter discovery request timed out

  /api/public/v1/call-types:
    get:
      operationId: listCallTypes
      summary: List active call types for the token's team
      tags: [Reference Data]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Team-scoped call types
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [callTypes]
                    properties:
                      callTypes:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCallTypeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/public/v1/elements:
    get:
      operationId: listElements
      summary: List active elements for the token's team
      tags: [Reference Data]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Team-scoped elements
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [elements]
                    properties:
                      elements:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicElementResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/public/v1/filters/call-owners:
    get:
      operationId: getCallOwners
      summary: Search call owners for the token's team
      tags: [Filters]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Optional prefix search string
      responses:
        "200":
          description: Team-scoped call owner options
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [callOwners]
                    properties:
                      callOwners:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCallOwnerOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Filter lookup request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: FILTER_LOOKUP_TIMEOUT
                  message: Filter lookup request timed out

  /api/public/v1/filters/company-domains:
    get:
      operationId: getCompanyDomains
      summary: Search company domains for the token's team
      tags: [Filters]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Optional prefix search string
      responses:
        "200":
          description: Team-scoped company domain options
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [companyDomains]
                    properties:
                      companyDomains:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCompanyDomainOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Filter lookup request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: FILTER_LOOKUP_TIMEOUT
                  message: Filter lookup request timed out

  /api/public/v1/filters/crm-deals:
    get:
      operationId: getCrmDeals
      summary: Search CRM deals for filter typeahead
      description: CRM deal reference data is org-scoped because the CRM connection is organization-owned.
      tags: [Filters]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Optional prefix search string
      responses:
        "200":
          description: Org-scoped CRM deal options
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [crmDeals]
                    properties:
                      crmDeals:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCrmDealOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Filter lookup request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: FILTER_LOOKUP_TIMEOUT
                  message: Filter lookup request timed out

  /api/public/v1/filters/crm-companies:
    get:
      operationId: getCrmCompanies
      summary: Search CRM companies for filter typeahead
      description: CRM company reference data is org-scoped because the CRM connection is organization-owned.
      tags: [Filters]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Optional prefix search string
      responses:
        "200":
          description: Org-scoped CRM company options
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [crmCompanies]
                    properties:
                      crmCompanies:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCrmCompanyOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Filter lookup request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: FILTER_LOOKUP_TIMEOUT
                  message: Filter lookup request timed out

  /api/public/v1/filters/crm-deal-stages:
    get:
      operationId: getCrmDealStages
      summary: List CRM deal stages for filter dropdown
      description: CRM deal stage reference data is org-scoped because the CRM connection is organization-owned.
      tags: [Filters]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Org-scoped CRM deal stage options
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [crmDealStages]
                    properties:
                      crmDealStages:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCrmDealStageOption"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/public/v1/filters/crm-fields:
    get:
      operationId: getCrmFields
      summary: List configured CRM fields for filtering
      description: CRM field configs are org-scoped because integration state and field configuration are organization-owned.
      tags: [Filters]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Org-scoped CRM field filter configuration
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [fields]
                    properties:
                      fields:
                        type: array
                        items:
                          $ref: "#/components/schemas/CrmFieldFilterConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API key with sk_ prefix. Obtain from OrgSettings > API Keys."

  responses:
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            missingToken:
              value:
                error:
                  code: MISSING_TOKEN
                  message: Authorization header with Bearer token is required
            invalidToken:
              value:
                error:
                  code: INVALID_TOKEN
                  message: Token is invalid
            tokenRevoked:
              value:
                error:
                  code: TOKEN_REVOKED
                  message: Token has been revoked
            tokenExpired:
              value:
                error:
                  code: TOKEN_EXPIRED
                  message: Token has expired

  schemas:
    ApiResponse:
      type: object
      description: Standard success envelope for all public API responses
      required: [data]
      properties:
        data:
          description: Response payload (type varies per endpoint)
        meta:
          type: object
          description: Optional metadata (e.g. pagination)
          properties:
            pagination:
              $ref: "#/components/schemas/Pagination"

    ApiError:
      type: object
      description: Standard error envelope for all public API error responses
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable UPPER_SNAKE_CASE error code
              example: INVALID_TOKEN
            message:
              type: string
              description: Human-readable error description
              example: Token is invalid
            details:
              type: object
              description: Optional additional error context
              additionalProperties: true

    Pagination:
      type: object
      required: [totalCount, hasMore, limit, offset]
      properties:
        totalCount:
          type: integer
          description: Total number of results across all pages
          example: 142
        hasMore:
          type: boolean
          description: Whether more results exist beyond the current page
          example: true
        limit:
          type: integer
          description: Number of results per page
          example: 20
        offset:
          type: integer
          description: Current offset into the result set
          example: 0

    PaginationMeta:
      type: object
