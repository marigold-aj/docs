openapi: "3.1.0"
info:
  title: OnePerfectSlice API
  version: "1.0.0"
  description: |
    Programmatic access to OnePerfectSlice. Authenticate with a team-scoped
    API key (Bearer sk_...) obtained from Org Settings → API Keys.

servers:
  - url: https://app.oneperfectslice.ai
    description: Production

security:
  - bearerAuth: []

paths:
  /api/public/v1/slices:
    get:
      operationId: listSlices
      summary: List slices
      description: |
        Returns all AI analysis templates available to your team, including each slice's key, title, business objective, and the elements it evaluates.

        **Related:** [Get slice details](/api-reference/slices/get-slice-details) · [Preview matched call count](/api-reference/slices/preview-matched-call-count)
      x-mint:
        content: |
          <Tip>This is usually your first API call. Browse the available slices, then use [Get slice details](/api-reference/slices/get-slice-details) to see the full output schema before running one.</Tip>
      tags: [Slices]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Slice list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [slices]
                    properties:
                      slices:
                        type: array
                        items:
                          $ref: "#/components/schemas/SliceSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/public/v1/slices/{key}:
    get:
      operationId: getSlice
      summary: Get slice details
      description: Returns the complete definition for a single slice, including its output schema, preferred model, and evidence grouping strategy. Use this to understand what a slice produces before running it.
      x-mint:
        content: |
          <Tip>The `outputSchema` field tells you the exact shape of the structured result you'll get when a run completes. Use it to plan how your integration handles the output.</Tip>
      tags: [Slices]
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Unique slice key (e.g. "high_intent_deals")
      responses:
        "200":
          description: Slice detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/SliceDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Monthly usage limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: USAGE_LIMIT_EXCEEDED
                  message: Monthly usage limit for AI insights runs has been exceeded
        "404":
          description: Slice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: SLICE_NOT_FOUND
                  message: Slice not found

  /api/public/v1/slices/{key}/preview-count:
    post:
      operationId: previewCount
      summary: Preview matched call count
      description: Returns how many calls match your filters without starting an analysis run. Use this to check scope and cost before committing to a run. Dates are required; all other filters are optional.
      x-mint:
        content: |
          <Tip>Always preview before running. This call is free — it only counts matching calls without using any AI credits.</Tip>
      tags: [Slices]
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Unique slice key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SliceFilterRequest"
      responses:
        "200":
          description: Matched call count
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [matchedCallCount]
                    properties:
                      matchedCallCount:
                        type: integer
                        description: Number of calls matching the filters
                        example: 87
        "400":
          description: Invalid filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidFilters:
                  value:
                    error:
                      code: INVALID_FILTERS
                      message: Filter validation failed
                dateRangeTooWide:
                  value:
                    error:
                      code: DATE_RANGE_TOO_WIDE
                      message: Maximum lookback is 90 days from today.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Slice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: SLICE_NOT_FOUND
                  message: Slice not found
        "503":
          description: Preview count request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: PREVIEW_COUNT_TIMEOUT
                  message: Preview count request timed out

  /api/public/v1/slices/{key}/run:
    post:
      operationId: runSlice
      summary: Run a slice
      description: |
        Starts an asynchronous AI analysis run for the given slice. Returns `202 Accepted` with a `runId` you can use to poll for results via GET /slice-runs/{id}.

        Pass an `Idempotency-Key` header to safely retry — same key with same arguments returns the original run, same key with different arguments returns `409`.

        **Related:** [Get run details](/api-reference/slice-runs/get-run-details) · [Get run evidence](/api-reference/slice-runs/get-run-evidence) · [List runs](/api-reference/slice-runs/list-runs)
      x-mint:
        content: |
          <Note>Runs are asynchronous. After starting a run, poll [Get run details](/api-reference/slice-runs/get-run-details) using the returned `runId`. Check `suggestedPollAfterSeconds` for the recommended wait time between polls.</Note>
      tags: [Slices]
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Unique slice key
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 255
          description: Client-provided idempotency key (Stripe convention). Same key + same args returns original runId. Same key + different args returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunSliceRequest"
      responses:
        "202":
          description: Run accepted (async execution started)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RunCreatedResponse"
        "400":
          description: Invalid filters or idempotency key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidFilters:
                  value:
                    error:
                      code: INVALID_FILTERS
                      message: Filter validation failed
                invalidIdempotencyKey:
                  value:
                    error:
                      code: INVALID_IDEMPOTENCY_KEY
                      message: Idempotency key must be between 1 and 255 characters
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Slice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: SLICE_NOT_FOUND
                  message: Slice not found
        "409":
          description: Idempotency key conflict (same key, different args)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: IDEMPOTENCY_KEY_CONFLICT
                  message: Idempotency key was already used with different arguments
        "429":
          description: Team already has the maximum number of active slice runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: CONCURRENT_RUN_LIMIT
                  message: Maximum of 5 concurrent slice runs per team. Wait for existing runs to complete.
        "503":
          description: Temporary unavailability during billing or idempotency admission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                billingUnavailable:
                  value:
                    error:
                      code: BILLING_UNAVAILABLE
                      message: Usage gating is temporarily unavailable
                idempotencyInProgress:
                  value:
                    error:
                      code: IDEMPOTENCY_KEY_IN_PROGRESS
                      message: A run for this Idempotency-Key is currently being created. Retry after a short delay.

  /api/public/v1/slice-runs:
    get:
      operationId: listSliceRuns
      summary: List runs
      description: Returns a paginated list of slice runs for your team, ordered by most recent first. Filter by slice key or status (pending, running, completed, failed).
      x-mint:
        content: |
          <Tip>Use `status=running` to check how many runs are active before starting a new one — there's a limit of 5 concurrent runs per team.</Tip>
      tags: [Slice Runs]
      security:
        - bearerAuth: []
      parameters:
        - name: sliceKey
          in: query
          required: false
          schema:
            type: string
          description: Filter by slice key
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, running, completed, failed]
          description: Filter by run status
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of results per page (max 100)
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Offset for pagination
      responses:
        "200":
          description: Paginated run list
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SliceRunListItem"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          description: Invalid filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: INVALID_FILTERS
                  message: "Invalid status filter. Valid values: pending, running, completed, failed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Run history request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: RUN_LIST_TIMEOUT
                  message: Run history request timed out

  /api/public/v1/slice-runs/{id}:
    get:
      operationId: getSliceRun
      summary: Get run details
      description: |
        Returns the current status, progress, and results for a slice run. Use this to poll an in-progress run — check `suggestedPollAfterSeconds` for the recommended wait time.

        When `status` is `completed`, the `result` field contains structured output conforming to the slice's output schema.

        **Related:** [Get run evidence](/api-reference/slice-runs/get-run-evidence) · [Search evidence](/api-reference/slice-runs/search-evidence)
      x-mint:
        content: |
          <Tip>Watch the `phase` field for granular progress: `queued` → `gathering_evidence` → `analyzing_calls` → `synthesizing` → `completed`. Show this to users if building a progress UI.</Tip>
      tags: [Slice Runs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Run ID
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/SliceRunDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Run not found or belongs to different org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: RUN_NOT_FOUND
                  message: Run not found
        "503":
          description: Run lookup request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: RUN_LOOKUP_TIMEOUT
                  message: Run lookup request timed out

  /api/public/v1/slice-runs/{id}/evidence:
    get:
      operationId: getSliceRunEvidence
      summary: Get run evidence
      description: Returns evidence items for a completed run, grouped by element. Each item includes a direct quote, source reference, and confidence score. Capped at 20 items per element — use the `count` field to see the true total.
      x-mint:
        content: |
          <Warning>This endpoint only works for completed runs. If the run is still in progress, you'll get a `409 RUN_NOT_COMPLETED` error. Poll [Get run details](/api-reference/slice-runs/get-run-details) first to confirm the run has finished.</Warning>
      tags: [Slice Runs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Run ID
      responses:
        "200":
          description: Evidence grouped by element
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/EvidenceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Run not found or belongs to different org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: RUN_NOT_FOUND
                  message: Run not found
        "409":
          description: Run is not yet completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: RUN_NOT_COMPLETED
                  message: Evidence is only available for completed runs
        "503":
          description: Evidence request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: EVIDENCE_TIMEOUT
                  message: Evidence request timed out

  /api/public/v1/evidence/search:
    post:
      operationId: searchEvidence
      summary: Search evidence
      description: Search for evidence across multiple completed runs. Filter by element keys, text query, call types, call owners, and date range. Useful for finding specific quotes or patterns across analyses.
      x-mint:
        content: |
          <Tip>Unlike [Get run evidence](/api-reference/slice-runs/get-run-evidence) which returns evidence for a single run, this endpoint searches across all your completed runs — useful for trend analysis or finding recurring themes.</Tip>
      tags: [Slice Runs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicEvidenceSearchRequest"
            example:
              elementKeys: ["intent_signal"]
              query: "budget"
              limit: 10
      responses:
        "200":
          description: Matching evidence items
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    properties:
                      matches:
                        type: array
                        items:
                          type: object
              example:
                data:
                  matches:
                    - quote: "We're aiming to have a vendor selected by end of Q2."
                      source:
                        type: transcript
                        id: "file:98123"
                        label: "Acme Corp — Discovery Call"
                        date: "2026-04-12"
                      confidence: 0.91
                      elementKey: intent_signal
                      runId: 12345
        "400":
          description: Invalid request body or filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Evidence request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/public/v1/posts/search:
    post:
      operationId: searchPosts
      summary: Search posts
      description: |
        Search AI-generated summaries and scorecards for your team. Filter by date, call type, rep, company, CRM deal, and more. Send an empty body `{}` to return recent posts.

        Set `detail: true` to get full post payloads, or leave it `false` (default) for compact summaries with snippets.

        **Related:** [Get a post](/api-reference/posts/get-a-post) · [List post filters](/api-reference/posts/list-post-filters)
      x-mint:
        content: |
          <Tip>Start with `detail: false` (the default) for faster, smaller responses. Only set `detail: true` when you need the full structured payload for a specific post.</Tip>
      tags: [Posts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicPostSearchRequest"
            example:
              templateType: ["summary"]
              limit: 5
      responses:
        "200":
          description: Paginated post search results
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: object
                    required: [posts]
                    properties:
                      posts:
                        type: array
                        items:
                          oneOf:
                            - $ref: "#/components/schemas/PublicPostSummaryResponse"
                            - $ref: "#/components/schemas/PublicPostResponse"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          description: Invalid request body or filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidRequest:
                  value:
                    error:
                      code: INVALID_REQUEST
                      message: Malformed JSON body
                invalidFilters:
                  value:
                    error:
                      code: INVALID_FILTERS
                      message: Limit must be between 1 and 100
                dateRangeTooWide:
                  value:
                    error:
                      code: DATE_RANGE_TOO_WIDE
                      message: Maximum lookback is 90 days from today.
                filterArrayTooLarge:
                  value:
                    error:
                      code: FILTER_ARRAY_TOO_LARGE
                      message: Filter array exceeds maximum size
                      details:
                        field: crmDealStages
                        maxAllowed: 100
                        validValuesEndpoint: /api/public/v1/filters/crm-deal-stages
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Post search request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: POST_SEARCH_TIMEOUT
                  message: Post search request timed out

  /api/public/v1/posts/{id}:
    get:
      operationId: getPost
      summary: Get a post
      description: Returns the full detail for a single post, including the structured result payload, call metadata, owner, and team information.
      x-mint:
        content: |
          <Tip>Use `fileId` (not `postId`) to link summaries and scorecards for the same call — a single call can produce both a summary post and a scorecard post.</Tip>
      tags: [Posts]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Full post detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/PublicPostResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/public/v1/posts/filters:
    get:
      operationId: listPostFilters
      summary: List post filters
      description: Returns the available filter keys and their valid values for post search. Use this to discover what filters your team can apply before calling POST /posts/search.
      x-mint:
        content: |
          <Tip>Call this first when building a filter UI. The response tells you exactly which filter keys exist and what values are valid for each.</Tip>
      tags: [Posts]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Available post filters
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [filters]
                    properties:
                      filters:
                        type: array
                        items:
                          $ref: "#/components/schemas/PostFilter"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Filter discovery request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: FILTER_LOOKUP_TIMEOUT
                  message: Filter discovery request timed out

  /api/public/v1/filters/call-owners:
    get:
      operationId: getCallOwners
      summary: Search call owners
      description: |
        Search for call owners on your team by name. Returns matching owners with their email and call count. Use the results to populate `callOwnerEmails` filters.

        **Related:** [Search posts](/api-reference/posts/search-posts) · [Run a slice](/api-reference/slices/run-a-slice)
      x-mint:
        content: |
          <Tip>Pass `q` for typeahead search, or omit it to get all call owners. Use the returned `email` values in `callOwnerEmails` filters on slice runs and post searches.</Tip>
      tags: [Filters]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Optional prefix search string
      responses:
        "200":
          description: Team-scoped call owner options
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [callOwners]
                    properties:
                      callOwners:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCallOwnerOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Filter lookup request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: FILTER_LOOKUP_TIMEOUT
                  message: Filter lookup request timed out

  /api/public/v1/filters/company-domains:
    get:
      operationId: getCompanyDomains
      summary: Search company domains
      description: Search for company domains associated with calls on your team. Returns matching domains with call counts. Use the results to populate `companyDomains` filters.
      tags: [Filters]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Optional prefix search string
      responses:
        "200":
          description: Team-scoped company domain options
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [companyDomains]
                    properties:
                      companyDomains:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCompanyDomainOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Filter lookup request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: FILTER_LOOKUP_TIMEOUT
                  message: Filter lookup request timed out

  /api/public/v1/filters/crm-deals:
    get:
      operationId: getCrmDeals
      summary: Search CRM deals
      description: Search CRM deals by name across your organization. Returns matching deals with stage, amount, and call count. CRM data is shared across all teams in your org.
      tags: [Filters]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Optional prefix search string
      responses:
        "200":
          description: Org-scoped CRM deal options
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [crmDeals]
                    properties:
                      crmDeals:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCrmDealOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Filter lookup request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: FILTER_LOOKUP_TIMEOUT
                  message: Filter lookup request timed out

  /api/public/v1/filters/crm-companies:
    get:
      operationId: getCrmCompanies
      summary: Search CRM companies
      description: Search CRM companies by name across your organization. Returns matching companies with call counts. CRM data is shared across all teams in your org.
      tags: [Filters]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Optional prefix search string
      responses:
        "200":
          description: Org-scoped CRM company options
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [crmCompanies]
                    properties:
                      crmCompanies:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCrmCompanyOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Filter lookup request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: FILTER_LOOKUP_TIMEOUT
                  message: Filter lookup request timed out

  /api/public/v1/filters/crm-deal-stages:
    get:
      operationId: getCrmDealStages
      summary: List CRM deal stages
      description: Returns all CRM deal stages for your organization with call counts. Use the results to populate `crmDealStages` filters in slice runs and post searches.
      tags: [Filters]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Org-scoped CRM deal stage options
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [crmDealStages]
                    properties:
                      crmDealStages:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCrmDealStageOption"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/public/v1/filters/crm-fields:
    get:
      operationId: getCrmFields
      summary: List CRM custom fields
      description: Returns the CRM fields configured for filtering in your organization, including field type, label, and valid options for enumeration fields. Use this to build `crmCustomFieldFilters` in your requests.
      tags: [Filters]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Org-scoped CRM field filter configuration
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [fields]
                    properties:
                      fields:
                        type: array
                        items:
                          $ref: "#/components/schemas/CrmFieldFilterConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/public/v1/call-types:
    get:
      operationId: listCallTypes
      summary: List call types
      description: Returns all active call types for your team (e.g., "Discovery Call", "Demo", "QBR"), including a count of how many calls have each type.
      x-mint:
        content: |
          <Tip>Use the `key` values from this response to populate `callTypes` filters in slice runs and evidence searches.</Tip>
      tags: [Reference Data]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Team-scoped call types
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [callTypes]
                    properties:
                      callTypes:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicCallTypeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/public/v1/elements:
    get:
      operationId: listElements
      summary: List elements
      description: Returns all active analysis elements for your team (e.g., "Budget Confirmation", "Competitive Mention"). Elements are the specific things a slice evaluates in your calls.
      x-mint:
        content: |
          <Tip>Use the `key` values from this response as `elementKeys` when searching evidence across runs.</Tip>
      tags: [Reference Data]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Team-scoped elements
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [elements]
                    properties:
                      elements:
                        type: array
                        items:
                          $ref: "#/components/schemas/PublicElementResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API key with sk_ prefix. Create one in Org Settings → API Keys."
      x-default: "sk_your_api_key"

  responses:
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            missingToken:
              value:
                error:
                  code: MISSING_TOKEN
                  message: Authorization header with Bearer token is required
            invalidToken:
              value:
                error:
                  code: INVALID_TOKEN
                  message: Token is invalid
            tokenRevoked:
              value:
                error:
                  code: TOKEN_REVOKED
                  message: Token has been revoked
            tokenExpired:
              value:
                error:
                  code: TOKEN_EXPIRED
                  message: Token has expired

  schemas:
    ApiResponse:
      type: object
      description: Standard success envelope for all public API responses
      required: [data]
      properties:
        data:
          description: Response payload (type varies per endpoint)
        meta:
          type: object
          description: Optional metadata (e.g. pagination)
          properties:
            pagination:
              $ref: "#/components/schemas/Pagination"

    ApiError:
      type: object
      description: Standard error envelope for all public API error responses
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable UPPER_SNAKE_CASE error code
              example: INVALID_TOKEN
            message:
              type: string
              description: Human-readable error description
              example: Token is invalid
            details:
              type: object
              description: Optional additional error context
              additionalProperties: true

    Pagination:
      type: object
      required: [totalCount, hasMore, limit, offset]
      properties:
        totalCount:
          type: integer
          description: Total number of results across all pages
          example: 142
        hasMore:
          type: boolean
          description: Whether more results exist beyond the current page
          example: true
        limit:
          type: integer
          description: Number of results per page
          example: 20
        offset:
          type: integer
          description: Current offset into the result set
          example: 0

    PaginationMeta:
      type: object
      required: [pagination]
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"

    PublicPostSearchRequest:
      type: object
      description: Post search filters. Send an empty body `{}` to return recent posts. All filters are optional.
      properties:
        callTypeId:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by call type IDs
        templateType:
          type: array
          items:
            type: string
            enum: [summary, scorecard]
          maxItems: 100
          description: Filter by template type
        startDate:
          type: string
          format: date-time
          description: Start datetime (inclusive)
        endDate:
          type: string
          format: date-time
          description: End datetime (inclusive)
        callOwnerEmails:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by call owner email
        companyDomains:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by company domain
        crmDealIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM deal IDs
        crmCompanyIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM company IDs
        crmDealStages:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by CRM deal stages
        crmAmountMin:
          type: number
          description: Minimum CRM deal amount
        crmAmountMax:
          type: number
          description: Maximum CRM deal amount
        crmCustomFieldFilters:
          type: array
          items:
            $ref: "#/components/schemas/CrmFieldFilterValue"
          maxItems: 100
          description: Custom CRM field filters
        detail:
          type: boolean
          default: false
          description: Return full post payloads when true; compact summaries when false
        fields:
          type: array
          items:
            type: string
          description: Optional response field selection hint
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        offset:
          type: integer
          minimum: 0
          default: 0

    PublicEvidenceSearchRequest:
      type: object
      description: Evidence search filters. At least one element key is required.
      required: [elementKeys]
      properties:
        elementKeys:
          type: array
          items:
            type: string
          description: Element keys to search for (e.g., ["intent_signal", "budget_confirmation"])
        query:
          type: string
          description: Free-text search across evidence quotes
        callTypes:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by call type keys (e.g., ["discovery_call"])
        callOwnerEmails:
          type: array
          items:
            type: string
          description: Filter by call owner emails
        dateFrom:
          type: string
          format: date
          description: Start date (inclusive)
        dateTo:
          type: string
          format: date
          description: End date (inclusive)
        limit:
          type: integer
          minimum: 1
          maximum: 100
          description: Maximum results to return (default varies)

    PublicPostSummaryResponse:
      type: object
