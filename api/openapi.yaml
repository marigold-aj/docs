        dateTo:
          type: string
          format: date
          description: End date (inclusive)
          example: "2026-04-26"
        callTypes:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by call types
        callOwnerEmails:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by call owner emails
        companyDomains:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by company domains
        crmDealIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM deal IDs
        crmCompanyIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM company IDs
        crmDealStages:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by CRM deal stages
