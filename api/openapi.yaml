        templateType:
          type: array
          items:
            type: string
            enum: [summary, scorecard]
          maxItems: 100
          description: Filter by template type
        startDate:
          type: string
          format: date-time
          description: Start datetime (inclusive)
        endDate:
          type: string
          format: date-time
          description: End datetime (inclusive)
        callOwnerEmails:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by call owner email
        companyDomains:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by company domain
        crmDealIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM deal IDs
        crmCompanyIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM company IDs
        crmDealStages:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by CRM deal stages
        crmAmountMin:
          type: number
          description: Minimum CRM deal amount
        crmAmountMax:
          type: number
          description: Maximum CRM deal amount
        crmCustomFieldFilters:
          type: array
          items:
            $ref: "#/components/schemas/CrmFieldFilterValue"
