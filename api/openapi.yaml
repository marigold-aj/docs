          enum: [pipeline, deals, expand, product]
          example: pipeline
        description:
          type: string
          description: What this slice surfaces
          example: Surfaces deals showing strong buying signals.
        elementKeys:
          type: array
          items:
            type: string
          description: Element keys this slice evaluates
          example: [intent_signal, budget_confirmation]

    SliceDetail:
      type: object
      required: [key, title, objective, description, elementKeys, outputSchema, preferredModel, includeCrmData, evidenceGrouping]
      properties:
        key:
          type: string
          example: high_intent_deals
        title:
          type: string
          example: High-Intent Deals
        objective:
          type: string
          enum: [pipeline, deals, expand, product]
          example: pipeline
        description:
          type: string
          example: Surfaces deals showing strong buying signals.
        elementKeys:
          type: array
          items:
            type: string
          example: [intent_signal, budget_confirmation]
        outputSchema:
          type: object
          description: JSON schema defining the structured output of this slice
          additionalProperties: true
        preferredModel:
          type: string
          description: LLM model used for analysis
          example: gpt-5-mini
        includeCrmData:
          type: boolean
          description: Whether CRM data is included in analysis context
          example: true
        evidenceGrouping:
          type: string
          description: How evidence is grouped in results
