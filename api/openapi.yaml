    SliceSummary:
      type: object
      required: [key, title, objective, description, elementKeys]
      properties:
        key:
          type: string
          description: Unique slice identifier
          example: high_intent_deals
        title:
          type: string
          description: Human-readable slice name
          example: High-Intent Deals
        objective:
          type: string
          description: Business objective category
          enum: [pipeline, deals, expand, product]
          example: pipeline
        description:
          type: string
          description: What this slice surfaces
          example: Surfaces deals showing strong buying signals.
        elementKeys:
          type: array
          items:
            type: string
          description: Element keys this slice evaluates
          example: [intent_signal, budget_confirmation]

    SliceDetail:
      type: object
      required: [key, title, objective, description, elementKeys, outputSchema, preferredModel, includeCrmData, evidenceGrouping]
      properties:
        key:
          type: string
          example: high_intent_deals
        title:
          type: string
          example: High-Intent Deals
        objective:
          type: string
          enum: [pipeline, deals, expand, product]
          example: pipeline
        description:
          type: string
          example: Surfaces deals showing strong buying signals.
        elementKeys:
          type: array
          items:
            type: string
          example: [intent_signal, budget_confirmation]
        outputSchema:
          type: object
          description: JSON schema defining the structured output of this slice
          additionalProperties: true
        preferredModel:
          type: string
          description: LLM model used for analysis
          example: gpt-5-mini
        includeCrmData:
          type: boolean
          description: Whether CRM data is included in analysis context
          example: true
        evidenceGrouping:
          type: string
          description: How evidence is grouped in results
          enum: [ByElement, ByAccount]
          example: ByElement

    SliceFilterRequest:
      type: object
      description: Filters for preview-count. dateFrom and dateTo are required. CRM filter values reference org-scoped CRM objects, but matched results remain team-scoped.
      required: [dateFrom, dateTo]
      properties:
        dateFrom:
          type: string
          format: date
          description: Start date (inclusive)
          example: "2026-03-26"
        dateTo:
          type: string
          format: date
          description: End date (inclusive)
          example: "2026-04-26"
        callTypes:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by call types
        callOwnerEmails:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by call owner emails
        companyDomains:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by company domains
        crmDealIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM deal IDs
        crmCompanyIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM company IDs
        crmDealStages:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by CRM deal stages
          example: [Qualification, Proposal]
        crmAmountMin:
          type: number
          description: Minimum CRM deal amount
        crmAmountMax:
          type: number
          description: Maximum CRM deal amount
        crmCustomFieldFilters:
          type: array
          items:
            $ref: "#/components/schemas/CrmFieldFilterValue"
          description: Custom CRM field filters

    RunSliceRequest:
      type: object
      description: Filters for slice run. dateFrom and dateTo use ISO-8601 datetime. CRM filter values reference org-scoped CRM objects, but execution remains team-scoped.
      properties:
        dateFrom:
          type: string
          format: date-time
          description: Start datetime (ISO-8601)
          example: "2026-03-26T00:00:00Z"
        dateTo:
          type: string
          format: date-time
          description: End datetime (ISO-8601)
          example: "2026-04-26T00:00:00Z"
        callTypes:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by call types
        sourceIds:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by source file IDs
        userPrompt:
          type: string
          description: Optional user prompt to customize analysis
        callOwnerEmails:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by call owner emails
        companyDomains:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by company domains
        crmDealIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM deal IDs
        crmCompanyIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM company IDs
        crmDealStages:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by CRM deal stages
          example: [Qualification, Proposal]
        crmAmountMin:
          type: number
          description: Minimum CRM deal amount
        crmAmountMax:
          type: number
          description: Maximum CRM deal amount
        crmCustomFieldFilters:
          type: array
          items:
            $ref: "#/components/schemas/CrmFieldFilterValue"
          description: Custom CRM field filters

    CrmFieldFilterValue:
      type: object
      description: Custom CRM field filter
      required: [entityType, fieldName, fieldType]
      properties:
        entityType:
          type: string
          enum: [deal, company, contact]
          description: CRM entity type
        fieldName:
          type: string
          description: Field name in the CRM
        fieldType:
          type: string
          enum: [string, number, date, datetime, boolean, enumeration]
          description: Data type of the field
        stringValue:
          type: string
          description: Filter value for string fields
        numberMin:
          type: number
          description: Range start for number fields
        numberMax:
          type: number
          description: Range end for number fields
        dateStart:
          type: string
          description: Range start for date/datetime fields (ISO-8601)
        dateEnd:
          type: string
          description: Range end for date/datetime fields (ISO-8601)
        booleanValue:
          type: boolean
          description: Filter value for boolean fields
        enumValues:
          type: array
          items:
            type: string
          description: Selected values for enumeration fields (multi-select)

    RunCreatedResponse:
      type: object
      required: [runId, sliceKey, sliceTitle, status]
      properties:
        runId:
          type: integer
          format: int64
          description: Unique run identifier for polling
          example: 12345
        sliceKey:
          type: string
          example: high_intent_deals
        sliceTitle:
          type: string
          example: High-Intent Deals
        status:
          type: string
          enum: [running]
          description: Always "running" for a newly created run
          example: running

    SliceRunListItem:
      type: object
      required: [id, sliceKey, sliceTitle, status, callsAnalyzed, filterSummary, startedAt]
      properties:
        id:
          type: integer
          format: int64
          example: 12345
        sliceKey:
          type: string
          example: high_intent_deals
        sliceTitle:
          type: string
          example: High-Intent Deals
        status:
          type: string
          enum: [pending, running, completed, failed]
          example: completed
        matchedCallCount:
          type: integer
          nullable: true
          description: Total calls matching filters (null until evidence summary populated)
          example: 87
        callsAnalyzed:
          type: integer
          description: Number of calls analyzed so far
          example: 42
        filterSummary:
          $ref: "#/components/schemas/SliceRunFilterSummary"
        startedAt:
          type: string
          format: date-time
          example: "2026-04-26T14:30:00Z"
        completedAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-26T14:32:18Z"

    SliceRunDetail:
      type: object
      required: [id, sliceKey, sliceTitle, status, phase, callsAnalyzed, filters, startedAt]
      properties:
        id:
          type: integer
          format: int64
          example: 12345
        sliceKey:
          type: string
          example: high_intent_deals
        sliceTitle:
          type: string
          example: High-Intent Deals
        status:
          type: string
          enum: [pending, running, completed, failed]
          example: completed
        phase:
          type: string
          enum: [queued, gathering_evidence, analyzing_calls, synthesizing, completed, failed]
          description: Coarse execution phase for the run
          example: analyzing_calls
        matchedCallCount:
          type: integer
          nullable: true
          description: Total calls matching filters (null until evidence summary populated)
          example: 87
        callsAnalyzed:
          type: integer
          description: Number of calls analyzed so far
          example: 42
        filters:
          type: object
          description: Filters that were applied for this run
          additionalProperties: true
        result:
          type: object
          nullable: true
          description: Structured result conforming to the slice's outputSchema (null until completed)
          additionalProperties: true
        error:
          type: string
          nullable: true
          description: Error message if run failed (null unless status is "failed")
        suggestedPollAfterSeconds:
          type: integer
          nullable: true
          description: Suggested delay before polling the run again
          example: 15
        progressMessage:
          type: string
          nullable: true
          description: Human-readable progress guidance for in-flight runs
          example: Run is analyzing matched calls.
        startedAt:
          type: string
          format: date-time
          example: "2026-04-26T14:30:00Z"
        completedAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-26T14:32:18Z"

    SliceRunFilterSummary:
      type: object
      required: [callTypes, callOwnerEmails, companyDomains, crmDealStages, crmDealIdsCount, crmCompanyIdsCount, hasCrmCustomFieldFilters]
      properties:
        dateFrom:
          type: string
          nullable: true
          description: ISO datetime lower bound from the original run filters, when present
          example: "2026-03-01T00:00:00.000Z"
        dateTo:
          type: string
          nullable: true
          description: ISO datetime upper bound from the original run filters, when present
          example: "2026-04-01T00:00:00.000Z"
        callTypes:
          type: array
          items:
            type: string
          description: Call type keys used when the run was created
        callOwnerEmails:
          type: array
          items:
            type: string
          description: Call owner filters used when the run was created
        companyDomains:
          type: array
          items:
            type: string
          description: Company domain filters used when the run was created
        crmDealStages:
          type: array
          items:
            type: string
          description: CRM deal stage filters used when the run was created
        crmDealIdsCount:
          type: integer
          description: Number of CRM deal IDs present in the original filter set
          example: 2
        crmCompanyIdsCount:
          type: integer
          description: Number of CRM company IDs present in the original filter set
          example: 1
        hasCrmCustomFieldFilters:
          type: boolean
          description: Whether the original run used CRM custom field filters
          example: true

    EvidenceResponse:
      type: object
      required: [summary, elements]
      properties:
        summary:
          $ref: "#/components/schemas/EvidenceSummary"
        elements:
          type: object
          description: Evidence items keyed by element key. Each value is an ElementEvidence object.
          additionalProperties:
            $ref: "#/components/schemas/ElementEvidence"

    EvidenceSummary:
      type: object
      required: [totalSources, totalElements, sourceBreakdown]
      properties:
        totalSources:
          type: integer
          description: Total number of unique sources referenced
          example: 15
        totalElements:
          type: integer
          description: Number of distinct elements with evidence
          example: 2
        sourceBreakdown:
          type: object
          description: Count of sources by type (e.g. transcript, crm_deal)
          additionalProperties:
            type: integer
          example:
            transcript: 12
            crm_deal: 3

    ElementEvidence:
      type: object
      required: [count, items]
      properties:
        count:
          type: integer
          description: Total number of evidence items for this element (may exceed items array length due to 20-item cap)
          example: 8
        items:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/EvidenceItem"

    EvidenceItem:
      type: object
      required: [quote, source, confidence]
      properties:
        quote:
          type: string
          description: Extracted quote from the source
          example: "We're aiming to have a vendor selected by end of Q2."
        source:
          $ref: "#/components/schemas/EvidenceSource"
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Confidence score (0.0 to 1.0)
          example: 0.91

    EvidenceSource:
      type: object
      required: [type, id, label]
      properties:
        type:
          type: string
          description: Source type
          example: transcript
        id:
          type: string
          description: Source identifier
          example: "file:98123"
        label:
          type: string
          description: Human-readable source label
          example: "Acme Corp — Discovery Call"
        date:
          type: string
          format: date
          description: Date of the source material
          example: "2026-04-12"
