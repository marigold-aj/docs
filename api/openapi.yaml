        callTypes:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by call types
        sourceIds:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by source file IDs
        userPrompt:
          type: string
          description: Optional user prompt to customize analysis
        callOwnerEmails:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by call owner emails
        companyDomains:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by company domains
        crmDealIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM deal IDs
        crmCompanyIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 100
          description: Filter by CRM company IDs
        crmDealStages:
          type: array
          items:
            type: string
          maxItems: 100
          description: Filter by CRM deal stages
          example: [Qualification, Proposal]
        crmAmountMin:
          type: number
          description: Minimum CRM deal amount
        crmAmountMax:
          type: number
          description: Maximum CRM deal amount
        crmCustomFieldFilters:
          type: array
          items:
            $ref: "#/components/schemas/CrmFieldFilterValue"
          description: Custom CRM field filters

