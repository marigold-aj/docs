          type: string
          enum: [pending, running, completed, failed]
          example: completed
        matchedCallCount:
          type: integer
          nullable: true
          description: Total calls matching filters (null while the run is still in progress)
          example: 87
        callsAnalyzed:
          type: integer
          description: Number of calls analyzed so far
          example: 42
        filterSummary:
          $ref: "#/components/schemas/SliceRunFilterSummary"
        startedAt:
          type: string
          format: date-time
          example: "2026-04-26T14:30:00Z"
        completedAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-26T14:32:18Z"

    SliceRunDetail:
      type: object
      required: [id, sliceKey, sliceTitle, status, phase, callsAnalyzed, filters, startedAt]
      properties:
        id:
          type: integer
          format: int64
          example: 12345
        sliceKey:
          type: string
          example: high_intent_deals
        sliceTitle:
          type: string
          example: High-Intent Deals
        status:
          type: string
          enum: [pending, running, completed, failed]
          example: completed
        phase:
          type: string
          enum: [queued, gathering_evidence, analyzing_calls, synthesizing, completed, failed]
          description: Current execution phase — use this for more granular progress tracking than `status`
          example: analyzing_calls
        matchedCallCount:
          type: integer
          nullable: true
          description: Total calls matching filters (null while the run is still in progress)
          example: 87
        callsAnalyzed:
          type: integer
          description: Number of calls analyzed so far
          example: 42
        filters:
          type: object
          description: Filters that were applied for this run
          additionalProperties: true
        result:
          type: object
          nullable: true
          description: Structured result conforming to the slice's outputSchema (null until completed)
          additionalProperties: true
        error:
          type: string
          nullable: true
          description: Error message if run failed (null unless status is "failed")
        suggestedPollAfterSeconds:
          type: integer
          nullable: true
          description: Suggested delay before polling the run again
          example: 15
        progressMessage:
          type: string
          nullable: true
          description: Human-readable progress guidance for in-flight runs
          example: Run is analyzing matched calls.
        startedAt:
          type: string
          format: date-time
          example: "2026-04-26T14:30:00Z"
        completedAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-26T14:32:18Z"

    SliceRunFilterSummary:
      type: object
      required: [callTypes, callOwnerEmails, companyDomains, crmDealStages, crmDealIdsCount, crmCompanyIdsCount, hasCrmCustomFieldFilters]
      properties:
        dateFrom:
          type: string
          nullable: true
          description: ISO datetime lower bound from the original run filters, when present
          example: "2026-03-01T00:00:00.000Z"
        dateTo:
          type: string
          nullable: true
          description: ISO datetime upper bound from the original run filters, when present
          example: "2026-04-01T00:00:00.000Z"
        callTypes:
          type: array
          items:
            type: string
          description: Call type keys used when the run was created
        callOwnerEmails:
          type: array
          items:
            type: string
          description: Call owner filters used when the run was created
        companyDomains:
          type: array
          items:
            type: string
          description: Company domain filters used when the run was created
        crmDealStages:
          type: array
          items:
            type: string
          description: CRM deal stage filters used when the run was created
        crmDealIdsCount:
          type: integer
          description: Number of CRM deal IDs present in the original filter set
          example: 2
        crmCompanyIdsCount:
          type: integer
          description: Number of CRM company IDs present in the original filter set
          example: 1
        hasCrmCustomFieldFilters:
          type: boolean
          description: Whether the original run used CRM custom field filters
          example: true

    EvidenceResponse:
      type: object
      required: [summary, elements]
      properties:
        summary:
          $ref: "#/components/schemas/EvidenceSummary"
        elements:
          type: object
          description: Evidence items keyed by element key. Each value is an ElementEvidence object.
          additionalProperties:
            $ref: "#/components/schemas/ElementEvidence"

    EvidenceSummary:
      type: object
      required: [totalSources, totalElements, sourceBreakdown]
      properties:
        totalSources:
          type: integer
          description: Total number of unique sources referenced
          example: 15
        totalElements:
          type: integer
          description: Number of distinct elements with evidence
          example: 2
        sourceBreakdown:
          type: object
          description: Count of sources by type (e.g. transcript, crm_deal)
          additionalProperties:
            type: integer
          example:
            transcript: 12
            crm_deal: 3

    ElementEvidence:
      type: object
      required: [count, items]
      properties:
        count:
          type: integer
          description: Total number of evidence items for this element (may exceed items array length due to 20-item cap)
          example: 8
        items:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/EvidenceItem"

    EvidenceItem:
      type: object
      required: [quote, source, confidence]
      properties:
        quote:
          type: string
          description: Extracted quote from the source
          example: "We're aiming to have a vendor selected by end of Q2."
        source:
          $ref: "#/components/schemas/EvidenceSource"
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Confidence score (0.0 to 1.0)
          example: 0.91

    EvidenceSource:
      type: object
      required: [type, id, label]
      properties:
        type:
          type: string
          description: Source type
          example: transcript
        id:
          type: string
          description: Source identifier
          example: "file:98123"
        label:
          type: string
          description: Human-readable source label
          example: "Acme Corp — Discovery Call"
        date:
          type: string
          format: date
          description: Date of the source material
          example: "2026-04-12"
